name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'adopt'
        
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Download Gradle wrapper jar
      run: curl -s -o gradle/wrapper/gradle-wrapper.jar https://services.gradle.org/distributions/gradle-2.0-wrapper.jar
      
    - name: Build with Gradle
      run: ./gradlew build
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CopyEverything
        path: build/libs/*.jar