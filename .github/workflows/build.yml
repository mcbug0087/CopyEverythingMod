name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'adopt'
        
    - name: Install Gradle 2.0
      run: |
        download_with_retry() {
          local url="$1"
          local output="$2"
          local max_retries="${3:-5}"
          local retry=0
          while [ $retry -lt $max_retries ]; do
            retry=$((retry + 1))
            echo "Attempt $retry/$max_retries: Downloading $url"
            if curl -sL --connect-timeout 30 --max-time 300 -o "$output" "$url"; then
              if [ -s "$output" ]; then
                echo "Successfully downloaded to $output"
                return 0
              else
                echo "Downloaded file is empty, retrying..."
              fi
            else
              echo "Download failed (curl exit code: $?), retrying..."
            fi
            rm -f "$output"
            sleep $((retry * 5))
          done
          echo "Failed to download $url after $max_retries attempts"
          return 1
        }
        
        download_with_retry "https://services.gradle.org/distributions/gradle-2.0-bin.zip" "gradle-2.0-bin.zip" 5
        unzip -q gradle-2.0-bin.zip
        echo "GRADLE_HOME=$(pwd)/gradle-2.0" >> $GITHUB_ENV
        echo "$(pwd)/gradle-2.0/bin" >> $GITHUB_PATH
        
    - name: Create Gradle cache directories
      run: |
        mkdir -p ~/.gradle/caches/minecraft/net/minecraft/client/1.7.10
        mkdir -p ~/.gradle/caches/minecraft/net/minecraft/server/1.7.10
        mkdir -p ~/.gradle/caches/minecraft/net/minecraftforge/forge/1.7.10-10.13.4.1614-1.7.10
        
    - name: Download Minecraft client jar
      run: |
        download_with_retry() {
          local url="$1"
          local output="$2"
          local max_retries="${3:-5}"
          local retry=0
          while [ $retry -lt $max_retries ]; do
            retry=$((retry + 1))
            echo "Attempt $retry/$max_retries: Downloading $url"
            if curl -sL --connect-timeout 30 --max-time 300 -o "$output" "$url"; then
              if [ -s "$output" ]; then
                echo "Successfully downloaded to $output"
                return 0
              else
                echo "Downloaded file is empty, retrying..."
              fi
            else
              echo "Download failed (curl exit code: $?), retrying..."
            fi
            rm -f "$output"
            sleep $((retry * 5))
          done
          echo "Failed to download $url after $max_retries attempts"
          return 1
        }
        
        URL="https://bmclapi2.bangbang93.com/version/1.7.10/client"
        OUTPUT=~/.gradle/caches/minecraft/net/minecraft/client/1.7.10/client-1.7.10.jar
        if download_with_retry "$URL" "$OUTPUT" 5; then
          echo "Client downloaded successfully"
        else
          echo "::warning::Client download failed, will try ForgeGradle default"
        fi
        
    - name: Download Minecraft server jar
      run: |
        download_with_retry() {
          local url="$1"
          local output="$2"
          local max_retries="${3:-5}"
          local retry=0
          while [ $retry -lt $max_retries ]; do
            retry=$((retry + 1))
            echo "Attempt $retry/$max_retries: Downloading $url"
            if curl -sL --connect-timeout 30 --max-time 300 -o "$output" "$url"; then
              if [ -s "$output" ]; then
                echo "Successfully downloaded to $output"
                return 0
              else
                echo "Downloaded file is empty, retrying..."
              fi
            else
              echo "Download failed (curl exit code: $?), retrying..."
            fi
            rm -f "$output"
            sleep $((retry * 5))
          done
          echo "Failed to download $url after $max_retries attempts"
          return 1
        }
        
        URL="https://bmclapi2.bangbang93.com/version/1.7.10/server"
        OUTPUT=~/.gradle/caches/minecraft/net/minecraft/server/1.7.10/server-1.7.10.jar
        if download_with_retry "$URL" "$OUTPUT" 5; then
          echo "Server downloaded successfully"
        else
          echo "::warning::Server download failed, will try ForgeGradle default"
        fi
        
    - name: Download Forge universal jar
      run: |
        download_with_retry() {
          local url="$1"
          local output="$2"
          local max_retries="${3:-5}"
          local retry=0
          while [ $retry -lt $max_retries ]; do
            retry=$((retry + 1))
            echo "Attempt $retry/$max_retries: Downloading $url"
            if curl -sL --connect-timeout 30 --max-time 300 -o "$output" "$url"; then
              if [ -s "$output" ]; then
                echo "Successfully downloaded to $output"
                return 0
              else
                echo "Downloaded file is empty, retrying..."
              fi
            else
              echo "Download failed (curl exit code: $?), retrying..."
            fi
            rm -f "$output"
            sleep $((retry * 5))
          done
          echo "Failed to download $url after $max_retries attempts"
          return 1
        }
        
        URL="https://bmclapi2.bangbang93.com/maven/net/minecraftforge/forge/1.7.10-10.13.4.1614-1.7.10/forge-1.7.10-10.13.4.1614-1.7.10-universal.jar"
        OUTPUT=~/.gradle/caches/minecraft/net/minecraftforge/forge/1.7.10-10.13.4.1614-1.7.10/forge-1.7.10-10.13.4.1614-1.7.10-universal.jar
        if download_with_retry "$URL" "$OUTPUT" 5; then
          echo "Forge universal downloaded successfully"
        else
          echo "::warning::Forge universal download failed, will try ForgeGradle default"
        fi
        
    - name: Start local HTTP server for mcpbot and forge
      run: |
        mkdir -p /tmp/mcpbot/maven/net/minecraftforge/forge
        # ForgeGradle parses versions.json as Map<String, Map<String, int[]>>
        echo '{"snapshot":{"1.7.10":[20240916]},"stable":{"1.7.10":[20240916]}}' > /tmp/mcpbot/versions.json
        # forge.json format: {"mcversion": {"forgeversion": "timestamp"}}
        # The forge version key must match exactly what's in build.gradle
        echo '{"1.7.10":{"10.13.4.1614-1.7.10":"2015-04-24T17:36:46+00:00"}}' > /tmp/mcpbot/maven/net/minecraftforge/forge/json
        sudo python3 -m http.server 80 --directory /tmp/mcpbot &
        sleep 2
        echo "Testing versions.json:"
        curl -s http://localhost/versions.json
        echo ""
        echo "Testing forge.json:"
        curl -s http://localhost/maven/net/minecraftforge/forge/json
        echo ""
        
    - name: Add hosts entries
      run: |
        echo "127.0.0.1 export.mcpbot.bspk.rs" | sudo tee -a /etc/hosts
        echo "127.0.0.1 files.minecraftforge.net" | sudo tee -a /etc/hosts
        
    - name: Build with Gradle
      run: gradle build --stacktrace
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CopyEverything
        path: build/libs/*.jar