name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'adopt'
        
    - name: Install Gradle 2.0
      run: |
        wget -q https://services.gradle.org/distributions/gradle-2.0-bin.zip
        unzip -q gradle-2.0-bin.zip
        echo "GRADLE_HOME=$(pwd)/gradle-2.0" >> $GITHUB_ENV
        echo "$(pwd)/gradle-2.0/bin" >> $GITHUB_PATH
        
    - name: Build with Gradle
      run: gradle build
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CopyEverything
        path: build/libs/*.jar