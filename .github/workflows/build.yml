name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'adopt'
        
    - name: Install Gradle 2.0
      run: |
        download_with_retry() {
          local url="$1"
          local output="$2"
          local max_retries="${3:-5}"
          local retry=0
          while [ $retry -lt $max_retries ]; do
            retry=$((retry + 1))
            echo "Attempt $retry/$max_retries: Downloading $url"
            if curl -sL --connect-timeout 30 --max-time 300 -o "$output" "$url"; then
              if [ -s "$output" ]; then
                echo "Successfully downloaded to $output"
                return 0
              else
                echo "Downloaded file is empty, retrying..."
              fi
            else
              echo "Download failed (curl exit code: $?), retrying..."
            fi
            rm -f "$output"
            sleep $((retry * 5))
          done
          echo "Failed to download $url after $max_retries attempts"
          return 1
        }
        
        download_with_retry "https://services.gradle.org/distributions/gradle-2.0-bin.zip" "gradle-2.0-bin.zip" 5
        unzip -q gradle-2.0-bin.zip
        echo "GRADLE_HOME=$(pwd)/gradle-2.0" >> $GITHUB_ENV
        echo "$(pwd)/gradle-2.0/bin" >> $GITHUB_PATH
        
    - name: Download Minecraft client/server jars to local mirror
      run: |
        download_with_retry() {
          local url="$1"
          local output="$2"
          local max_retries="${3:-5}"
          local retry=0
          while [ $retry -lt $max_retries ]; do
            retry=$((retry + 1))
            echo "Attempt $retry/$max_retries: Downloading $url"
            if curl -sL --connect-timeout 30 --max-time 300 -o "$output" "$url"; then
              if [ -s "$output" ]; then
                echo "Successfully downloaded to $output"
                return 0
              else
                echo "Downloaded file is empty, retrying..."
              fi
            else
              echo "Download failed (curl exit code: $?), retrying..."
            fi
            rm -f "$output"
            sleep $((retry * 5))
          done
          echo "Failed to download $url after $max_retries attempts"
          return 1
        }
        
        # Create directory structure for s3.amazonaws.com/Minecraft.Download
        mkdir -p /tmp/mcpbot/Minecraft.Download/versions/1.7.10
        
        # Download client jar - ForgeGradle expects 1.7.10.jar
        download_with_retry "https://bmclapi2.bangbang93.com/version/1.7.10/client" \
          "/tmp/mcpbot/Minecraft.Download/versions/1.7.10/1.7.10.jar" 5
        
        # Download server jar - ForgeGradle expects minecraft_server.1.7.10.jar
        download_with_retry "https://bmclapi2.bangbang93.com/version/1.7.10/server" \
          "/tmp/mcpbot/Minecraft.Download/versions/1.7.10/minecraft_server.1.7.10.jar" 5
        
        echo "Client jar size: $(wc -c < /tmp/mcpbot/Minecraft.Download/versions/1.7.10/1.7.10.jar) bytes"
        echo "Server jar size: $(wc -c < /tmp/mcpbot/Minecraft.Download/versions/1.7.10/minecraft_server.1.7.10.jar) bytes"
        
        # Download 1.7.10.json for getVersionJson task
        download_with_retry "https://bmclapi2.bangbang93.com/version/1.7.10" \
          "/tmp/mcpbot/Minecraft.Download/versions/1.7.10/1.7.10.json" 5 || true
        
        # Download fernflower for downloadMcpTools task
        # fernflower-fix-1.0.zip is just a fernflower jar renamed (jar = zip)
        FERNFLOWER_URLS=(
          "https://maven.minecraftforge.net/net/minecraftforge/fernflower/1.0/fernflower-1.0.jar"
          "https://bmclapi2.bangbang93.com/maven/net/minecraftforge/fernflower/1.0/fernflower-1.0.jar"
          "https://maven.minecraftforge.net/net/minecraftforge/fernflower/0.8.6/fernflower-0.8.6.jar"
          "https://bmclapi2.bangbang93.com/maven/net/minecraftforge/fernflower/0.8.6/fernflower-0.8.6.jar"
        )
        FERNFLOWER_DL=false
        for url in "${FERNFLOWER_URLS[@]}"; do
          echo "Trying fernflower from: $url"
          if curl -sL --connect-timeout 30 --max-time 120 -o "/tmp/mcpbot/fernflower-fix-1.0.zip" "$url"; then
            if [ -s "/tmp/mcpbot/fernflower-fix-1.0.zip" ]; then
              echo "Successfully downloaded fernflower from: $url"
              echo "Fernflower size: $(wc -c < /tmp/mcpbot/fernflower-fix-1.0.zip) bytes"
              FERNFLOWER_DL=true
              break
            fi
          fi
          rm -f "/tmp/mcpbot/fernflower-fix-1.0.zip"
        done
        if [ "$FERNFLOWER_DL" = false ]; then
          echo "::error::Failed to download fernflower from all sources"
          exit 1
        fi
        
    - name: Download real forge.json and versions.json
      run: |
        download_with_retry() {
          local url="$1"
          local output="$2"
          local max_retries="${3:-5}"
          local retry=0
          while [ $retry -lt $max_retries ]; do
            retry=$((retry + 1))
            echo "Attempt $retry/$max_retries: Downloading $url"
            if curl -sL --connect-timeout 30 --max-time 300 -o "$output" "$url"; then
              if [ -s "$output" ]; then
                echo "Successfully downloaded to $output"
                return 0
              else
                echo "Downloaded file is empty, retrying..."
              fi
            else
              echo "Download failed (curl exit code: $?), retrying..."
            fi
            rm -f "$output"
            sleep $((retry * 5))
          done
          echo "Failed to download $url after $max_retries attempts"
          return 1
        }
        
        mkdir -p /tmp/mcpbot/maven/net/minecraftforge/forge
        
        # Download the real forge.json from BMCLAPI (same format as files.minecraftforge.net)
        download_with_retry "https://bmclapi2.bangbang93.com/maven/net/minecraftforge/forge/json" "/tmp/mcpbot/maven/net/minecraftforge/forge/json" 5
        echo "forge.json size: $(wc -c < /tmp/mcpbot/maven/net/minecraftforge/forge/json) bytes"
        
        # Download the real versions.json from BMCLAPI for MCP mappings
        download_with_retry "https://bmclapi2.bangbang93.com/maven/de/oceanlabs/mcp/versions.json" "/tmp/mcpbot/versions.json" 5
        echo "versions.json size: $(wc -c < /tmp/mcpbot/versions.json) bytes"
        
        # Verify JSON is valid
        python3 -c "import json; json.load(open('/tmp/mcpbot/maven/net/minecraftforge/forge/json')); print('forge.json is valid JSON')"
        python3 -c "import json; json.load(open('/tmp/mcpbot/versions.json')); print('versions.json is valid JSON')"
        
    - name: Start local HTTP server
      run: |
        sudo python3 -m http.server 80 --directory /tmp/mcpbot &
        sleep 2
        echo "Testing versions.json:"
        curl -s http://localhost/versions.json | head -c 200
        echo ""
        echo "Testing forge.json:"
        curl -s http://localhost/maven/net/minecraftforge/forge/json | head -c 200
        echo ""
        echo "Testing client jar (HEAD):"
        curl -sI http://localhost/Minecraft.Download/versions/1.7.10/1.7.10.jar | head -5
        echo "Testing server jar (HEAD):"
        curl -sI http://localhost/Minecraft.Download/versions/1.7.10/minecraft_server.1.7.10.jar | head -5
        echo "Testing fernflower (HEAD):"
        curl -sI http://localhost/fernflower-fix-1.0.zip | head -5
        
    - name: Add hosts entries
      run: |
        echo "127.0.0.1 export.mcpbot.bspk.rs" | sudo tee -a /etc/hosts
        echo "127.0.0.1 files.minecraftforge.net" | sudo tee -a /etc/hosts
        echo "127.0.0.1 s3.amazonaws.com" | sudo tee -a /etc/hosts
        
    - name: Build with Gradle
      run: gradle build --stacktrace
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CopyEverything
        path: build/libs/*.jar